name: CI

on:
  push: { branches: [main, develop] }
  pull_request: { branches: [main, develop] }

permissions:
  contents: read
  id-token: write   # for cosign / OIDC publishing
  packages: write   # ghcr push

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: kynara_test }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - run: |
          cd backend
          pip install -e '.[dev]'
      - name: Lint
        run: |
          cd backend
          ruff check .
          ruff format --check .
      - name: Type-check
        run: |
          cd backend
          mypy app
      - name: Security scan (bandit)
        run: |
          cd backend
          bandit -q -r app -lll
      - name: Migrate
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kynara_test
        run: |
          cd backend
          alembic upgrade head
      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kynara_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          pytest -q --cov=app --cov-fail-under=70

  sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - run: |
          cd sdk
          pip install -e '.[dev]'
          pytest -q

  sdk-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: npm, cache-dependency-path: sdk-ts/package-lock.json }
      - run: |
          cd sdk-ts
          npm ci || npm install
          npm run build
          npm test --if-present

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: |
          cd frontend
          npm ci || npm install
          npm run typecheck --if-present || npx tsc --noEmit
          npm run build

  sidecar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - run: |
          cd sidecar
          go vet ./...
          go build ./...

  containers:
    needs: [backend, sdk-python, sdk-typescript, frontend, sidecar]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    env:
      CHANNEL: ${{ github.ref == 'refs/heads/main' && 'latest' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:${{ env.CHANNEL }}
      - name: Build & push sidecar
        uses: docker/build-push-action@v6
        with:
          context: sidecar
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/sidecar:${{ github.sha }}
            ghcr.io/${{ github.repository }}/sidecar:${{ env.CHANNEL }}
      - name: Sign images with cosign
        uses: sigstore/cosign-installer@v3
      - run: |
          cosign sign --yes ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cosign sign --yes ghcr.io/${{ github.repository }}/sidecar:${{ github.sha }}
      - name: Trivy scan (fail on Critical/High)
        # Only block on security issues for production builds
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
