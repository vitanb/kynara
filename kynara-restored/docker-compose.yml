services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kynara
      POSTGRES_USER: kynara
      POSTGRES_PASSWORD: kynara_dev
    volumes:
      - pg_data:/var/lib/postgresql/data
    # Port not exposed to host — backend reaches it via Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kynara"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # Port not exposed to host — backend reaches it via Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://kynara:kynara_dev@db:5432/kynara
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-prod-please-this-is-dev-only
      ENV: dev
      OKTA_ISSUER: ${OKTA_ISSUER:-}
      OKTA_CLIENT_ID: ${OKTA_CLIENT_ID:-}
      OKTA_CLIENT_SECRET: ${OKTA_CLIENT_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    command: ["--config=/etc/otel-config.yaml"]
    volumes:
      - ./scripts/otel-config.yaml:/etc/otel-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC
      - "8889:8889" # Prometheus exporter
    profiles: ["monitoring"]   # only starts when explicitly requested

volumes:
  pg_data:
