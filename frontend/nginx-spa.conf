server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # NAMESERVER is extracted from /etc/resolv.conf at container start by
    # docker-entrypoint-frontend.sh — it is Railway's actual internal resolver.
    # IPv6 addresses are automatically wrapped in brackets by the entrypoint.
    # valid=10s means the address is re-resolved every 10s, picking up redeploys.
    resolver ${NAMESERVER} valid=10s;

    # Proxy all /api requests to the backend.
    location /api/ {
        set $backend "${BACKEND_URL}";
        proxy_pass               $backend;
        proxy_set_header         Host              $host;
        proxy_set_header         X-Real-IP         $remote_addr;
        proxy_set_header         X-Forwarded-For   $remote_addr;
        proxy_set_header         X-Forwarded-Proto "https";
        proxy_set_header         X-Forwarded-Host  $host;
        proxy_connect_timeout    10s;
        proxy_read_timeout       60s;
        proxy_redirect           off;
    }

    # OAuth 2.0 backend endpoints.
    # /oauth/consent is a React SPA page — must NOT be proxied.
    # /oauth/register handles RFC 7591 dynamic client registration.
    location ~ ^/oauth/(authorize|token|userinfo|register) {
        set $backend "${BACKEND_URL}";
        proxy_pass               $backend;
        proxy_set_header         Host              $host;
        proxy_set_header         X-Real-IP         $remote_addr;
        proxy_set_header         X-Forwarded-For   $remote_addr;
        proxy_set_header         X-Forwarded-Proto "https";
        proxy_set_header         X-Forwarded-Host  $host;
        proxy_connect_timeout    10s;
        proxy_read_timeout       60s;
        proxy_redirect           off;
    }

    # RFC 8414 OAuth metadata + MCP Streamable HTTP endpoint
    location ~ ^/(\.well-known/|mcp/) {
        set $backend "${BACKEND_URL}";
        proxy_pass               $backend;
        proxy_set_header         Host              $host;
        proxy_set_header         X-Real-IP         $remote_addr;
        proxy_set_header         X-Forwarded-For   $remote_addr;
        proxy_set_header         X-Forwarded-Proto "https";
        proxy_set_header         X-Forwarded-Host  $host;
        proxy_connect_timeout    10s;
        # SSE connections are long-lived — increase read timeout
        proxy_read_timeout       300s;
        proxy_redirect           off;
        # Required for SSE / streaming
        proxy_buffering          off;
        proxy_cache              off;
        chunked_transfer_encoding on;
    }

    # SPA fallback — must come after all backend proxy blocks
    location / {
        try_files $uri $uri/ /index.html;
    }
}
