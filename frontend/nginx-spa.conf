server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # NAMESERVER is extracted from /etc/resolv.conf at container start by
    # docker-entrypoint-frontend.sh — it is Railway's actual internal resolver.
    # IPv6 addresses are automatically wrapped in brackets by the entrypoint.
    # valid=10s means the address is re-resolved every 10s, picking up redeploys.
    resolver ${NAMESERVER} valid=10s;

    # Proxy all /api requests to the backend.
    # BACKEND_URL is injected at container start by docker-entrypoint-frontend.sh.
    #
    # Use Railway private networking (fastest, no egress cost, no 508 loops):
    #   BACKEND_URL=http://backend.railway.internal:8000
    #
    # Ensure Private Networking is enabled in Railway project settings and
    # that both frontend and backend services are in the same environment.
    location /api/ {
        # proxy_pass must use a variable when a custom resolver is active so
        # nginx re-resolves the hostname dynamically instead of caching at boot.
        set $backend "${BACKEND_URL}";
        proxy_pass               $backend;
        proxy_set_header         Host              $host;
        proxy_set_header         X-Real-IP         $remote_addr;
        proxy_set_header         X-Forwarded-For   $remote_addr;
        proxy_set_header         X-Forwarded-Proto "https";
        proxy_set_header         X-Forwarded-Host  $host;
        proxy_connect_timeout    10s;
        proxy_read_timeout       60s;
        proxy_redirect           off;
    }

    # SPA fallback — must come after /api/ block
    location / {
        try_files $uri $uri/ /index.html;
    }
}
