server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api requests to the backend.
    # BACKEND_URL is injected at container start by docker-entrypoint-frontend.sh.
    #
    # Recommended value (avoids all IPv6/private-networking complexity):
    #   BACKEND_URL=https://<your-backend>.up.railway.app
    #
    # Using the public Railway HTTPS URL means nginx connects over TLS to a
    # domain with a valid cert — no IPv6, no DNS caching, no stale IPs.
    # proxy_ssl_server_name sends the correct SNI so the cert matches.
    location /api/ {
        proxy_pass               ${BACKEND_URL};
        proxy_ssl_server_name    on;
        proxy_ssl_protocols      TLSv1.2 TLSv1.3;
        proxy_set_header         Host              $proxy_host;
        proxy_set_header         X-Real-IP         $remote_addr;
        proxy_set_header         X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header         X-Forwarded-Proto $scheme;
        proxy_connect_timeout    10s;
        proxy_read_timeout       60s;
    }

    # SPA fallback — must come after /api/ block
    location / {
        try_files $uri $uri/ /index.html;
    }
}
