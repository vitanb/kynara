server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api requests to the backend.
    # BACKEND_URL is injected at container start by docker-entrypoint-frontend.sh.
    #
    # Set BACKEND_URL to the backend's public Railway HTTPS URL:
    #   BACKEND_URL=https://backend-production-4ca40.up.railway.app
    #
    # We clear Via and reset X-Forwarded-For to $remote_addr (overwrite, not
    # append) so Railway's edge does not detect a proxy loop (508).
    location /api/ {
        proxy_pass               ${BACKEND_URL};
        proxy_set_header         Host              $host;
        proxy_set_header         X-Real-IP         $remote_addr;
        # Overwrite forwarded chain — prevents Railway 508 loop detection
        proxy_set_header         X-Forwarded-For   $remote_addr;
        proxy_set_header         X-Forwarded-Proto "https";
        proxy_set_header         X-Forwarded-Host  $host;
        # Clear Via — Railway uses it for loop detection
        proxy_set_header         Via               "";
        proxy_connect_timeout    10s;
        proxy_read_timeout       60s;
        proxy_redirect           off;
        proxy_ssl_server_name    on;
    }

    # SPA fallback — must come after /api/ block
    location / {
        try_files $uri $uri/ /index.html;
    }
}
