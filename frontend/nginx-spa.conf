server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Force IPv4-only DNS resolution.
    # Railway private networking returns both A (IPv4) and AAAA (IPv6) records.
    # Uvicorn listens on 0.0.0.0 (IPv4 only) so nginx must not pick the IPv6
    # address — ipv6=off ensures it always connects over IPv4.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy all /api requests to the backend.
    # BACKEND_URL is injected at container start by docker-entrypoint-frontend.sh.
    #
    # Use Railway private networking (fastest, no egress cost, no 508 loops):
    #   BACKEND_URL=http://backend.railway.internal:8000
    #
    # Ensure Private Networking is enabled in Railway project settings and
    # that both frontend and backend services are in the same environment.
    location /api/ {
        # proxy_pass must reference a variable when using a custom resolver
        # so nginx re-resolves the hostname on each request (picks up redeploys).
        set $backend "${BACKEND_URL}";
        proxy_pass               $backend;
        proxy_set_header         Host              $host;
        proxy_set_header         X-Real-IP         $remote_addr;
        proxy_set_header         X-Forwarded-For   $remote_addr;
        proxy_set_header         X-Forwarded-Proto "https";
        proxy_set_header         X-Forwarded-Host  $host;
        proxy_connect_timeout    10s;
        proxy_read_timeout       60s;
        proxy_redirect           off;
    }

    # SPA fallback — must come after /api/ block
    location / {
        try_files $uri $uri/ /index.html;
    }
}
