## Kynara Helm chart values.
## See README.md and templates/ for variable reference.

global:
  region: us-east-1
  imageRegistry: ghcr.io/kynara
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

backend:
  replicaCount: 3
  image:
    repository: ghcr.io/kynara/backend
    tag: ""        # defaults to .Chart.AppVersion
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: 1,    memory: 1Gi }
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 30
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  topologySpreadConstraints:
    enabled: true
  env:
    KYNARA_FAIL_CLOSED: "true"
    LOG_LEVEL: "INFO"
  envFromSecret: kynara-backend-secrets
  livenessProbe:
    httpGet: { path: /healthz, port: http }
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet: { path: /healthz, port: http }
    initialDelaySeconds: 3
    periodSeconds: 3

webhookWorker:
  enabled: true
  replicaCount: 2
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

anomalyDetector:
  enabled: true
  schedule: "*/5 * * * *"
  resources:
    requests: { cpu: 100m, memory: 256Mi }

jitExpirer:
  enabled: true
  schedule: "*/2 * * * *"

sidecar:
  ## Set to true to deploy a fleet-wide DaemonSet decision sidecar.
  enabled: false
  image:
    repository: ghcr.io/kynara/sidecar
    tag: ""
  service:
    port: 7070
  refreshSeconds: 30

frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/kynara/frontend
    tag: ""
  service:
    port: 8080

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
  hosts:
    - host: api.kynara.example.com
      paths:
        - { path: /, service: backend }
    - host: app.kynara.example.com
      paths:
        - { path: /, service: frontend }
    - host: trust.kynara.example.com
      paths:
        - { path: /, service: trust-center }
  tls:
    - hosts:
        - api.kynara.example.com
        - app.kynara.example.com
        - trust.kynara.example.com
      secretName: kynara-tls

postgres:
  ## When deploying inside a customer's k8s cluster you usually point to RDS.
  external:
    host: ""
    port: 5432
    database: kynara
    sslmode: require

redis:
  external:
    host: ""
    port: 6379

observability:
  prometheus:
    enabled: true
    path: /metrics
  otlp:
    endpoint: ""

networkPolicy:
  enabled: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities: { drop: ["ALL"] }
  seccompProfile: { type: RuntimeDefault }

serviceAccount:
  create: true
  name: kynara
  ## For BYOK / KMS access, set the IRSA role annotation here.
  annotations: {}
