{{- if .Values.anomalyDetector.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "kynara.fullname" . }}-anomaly-detector
  labels:
    {{- include "kynara.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.anomalyDetector.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ .Values.serviceAccount.name }}
          restartPolicy: OnFailure
          containers:
            - name: detector
              image: {{ include "kynara.backend.image" . }}
              command: ["python", "-m", "app.scripts.run_anomaly_detector"]
              envFrom:
                - secretRef: { name: {{ .Values.backend.envFromSecret }} }
              resources: {{- toYaml .Values.anomalyDetector.resources | nindent 16 }}
              securityContext:
                {{- toYaml .Values.containerSecurityContext | nindent 16 }}
{{- end }}
